# Secret démo (mêmes valeurs que .env.example à la racine du monorepo).
# En prod : kubectl create secret generic g7-suivi-secret --from-literal=... -n sgitu-g7
apiVersion: v1
kind: Secret
metadata:
  name: g7-suivi-secret
  namespace: sgitu-g7
  labels:
    app: g7-suivi-vehicule
type: Opaque
stringData:
  SPRING_DATASOURCE_PASSWORD: "password"
  POSTGRES_PASSWORD: "password"
  JWT_SECRET: "sgitu_g7_secret_key_2025_very_long_secret"
