apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-g7
  namespace: sgitu-g7
  labels:
    app: postgres-g7
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-g7
  template:
    metadata:
      labels:
        app: postgres-g7
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "g7_vehicules"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: g7-suivi-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "g7_vehicules"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "g7_vehicules"]
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-g7
  namespace: sgitu-g7
  labels:
    app: postgres-g7
spec:
  type: ClusterIP
  selector:
    app: postgres-g7
  ports:
    - port: 5432
      targetPort: 5432
