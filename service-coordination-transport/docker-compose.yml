services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: sgitu-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9092'"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - sgitu-net

  postgres:
    image: postgres:16-alpine
    container_name: sgitu-g4-postgres
    environment:
      POSTGRES_DB: sgitu_g4
      POSTGRES_USER: g4
      POSTGRES_PASSWORD: g4
    ports:
      - "5434:5432"
    volumes:
      - sgitu_g4_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U g4 -d sgitu_g4"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sgitu-net

  g4-coordination:
    build: .
    container_name: sgitu-g4-coordination
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8084"
      JPA_DDL_AUTO: update
      SGITU_KAFKA_ENABLED: "true"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      SGITU_G9_INCIDENT_TOPIC: "${SGITU_G9_INCIDENT_TOPIC:-incident.transport.topic}"
      SGITU_G7_POSITIONS_TOPIC: "${SGITU_G7_POSITIONS_TOPIC:-vehicule-positions}"
      SGITU_G1_MISSION_TOPIC: "${SGITU_G1_MISSION_TOPIC:-missions-lifecycle}"
      SGITU_G9_CONSUMER_GROUP: "${SGITU_G9_CONSUMER_GROUP:-g4-coordination-g9}"
      SGITU_G7_CONSUMER_GROUP: "${SGITU_G7_CONSUMER_GROUP:-g4-coordination-g7}"
      SGITU_G10_URL: "${SGITU_G10_URL:-http://g10-gateway:8080}"
      SGITU_G5_URL: "${SGITU_G5_URL:-http://g5-notifications:8085}"
      SGITU_G1_URL: "${SGITU_G1_URL:-http://g1-billetterie:8081}"
      SGITU_G7_URL: "${SGITU_G7_URL:-http://g7-tracking:8087}"
      SGITU_G9_URL: "${SGITU_G9_URL:-http://g9-incidents:8089}"
      SGITU_INTEGRATION_G5_NOTIFICATION_PATH: "${SGITU_INTEGRATION_G5_NOTIFICATION_PATH:-/api/notifications/send}"
      SGITU_G1_MISSION_LIFECYCLE_PATH: "${SGITU_G1_MISSION_LIFECYCLE_PATH:-/api/internal/missions/events}"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - sgitu-net

volumes:
  sgitu_g4_pgdata:

networks:
  sgitu-net:
    name: sgitu-network
    driver: bridge
