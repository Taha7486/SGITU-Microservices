# Secret JWT (démo / intégration — même valeur que docker-compose).
# En prod : kubectl create secret generic g4-coordination-secret --from-literal=...
apiVersion: v1
kind: Secret
metadata:
  name: g4-coordination-secret
  namespace: sgitu-g4
  labels:
    app: g4-coordination
    group: G4
type: Opaque
stringData:
  SGITU_JWT_SECRET: "SGITU_G3_JWT_SECRET_KEY_CHANGE_ME_IN_PRODUCTION_256BITS!!"
