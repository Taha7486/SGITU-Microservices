# =============================================================
#  SGITU — G5 Notifications
#  application.yml (profil par défaut + profil docker)
# =============================================================

spring:
  application:
    name: notification-service

  # ── Base de données MySQL ─────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3314/notifications_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Africa/Casablanca
    username: sgitu
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  # ── Kafka ─────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9093
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "ma.sgitu.g5.notifications.dto.kafka"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # ── Mail (MailHog en dev) ─────────────────────────────────
  mail:
    host: localhost
    port: 1026
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# ── JWT (fourni par G10) ────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24 heures en millisecondes

# ── Configuration G5 ────────────────────────────────────────
g5:
  # Retry configuration
  retry:
    max-attempts: 3
    initial-interval: 60000      # 1 minute
    multiplier: 2.0              # exponentiel : 1min, 2min, 4min
  
  # Canaux supportés
  channels:
    enabled: EMAIL,SMS,PUSH
  
  # Templates par défaut
  templates:
    default-language: fr

# ── Logging ─────────────────────────────────────────────────
logging:
  level:
    ma.sgitu.g5.notifications: DEBUG
    org.springframework.kafka: INFO
    org.springframework.mail: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ── Server ──────────────────────────────────────────────────
server:
  port: 8085
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# ── SpringDoc / OpenAPI ─────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  show-actuator: true

---
# =============================================================
#  PROFIL DOCKER (activé via SPRING_PROFILES_ACTIVE=docker)
# =============================================================
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:mysql://mysql-notification:3306/notifications_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Africa/Casablanca
    username: sgitu
    password: ${MYSQL_PASSWORD}

  kafka:
    bootstrap-servers: kafka:9092

  mail:
    host: mailhog
    port: 1025

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    ma.sgitu.g5.notifications: INFO