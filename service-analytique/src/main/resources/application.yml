server:
  port: 8088

spring:
  application:
    name: g8-analytics-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/g8_analytics}
      database: g8_analytics

logging:
  level:
    ma.sgitu.g8: DEBUG

g5:
  notification:
    url: ${G5_NOTIFICATION_URL:http://localhost:8085/api/notifications/send}
ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:5000}

# JWT
jwt:
  secret: sgitu_g8_secret_key_2025_very_long_secret_for_analytics
  expiration: 86400000

# Kafka
spring.kafka:
  bootstrap-servers: localhost:9092
  consumer:
    group-id: g8-analytics-group
    auto-offset-reset: earliest
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  listener:
    missing-topics-fatal: false

kafka:
  topic:
    crossgroup: sgitu.crossgroup.events

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  info:
    title: Data Analysis API
    description: API for launching, monitoring and managing data analyses
    version: 1.0.0
    contact:
      name: SGITU Team
      email: support@sgitu.ma
  servers:
    - url: http://localhost:8088
      description: Development server
    - url: https://api.sgitu.ma
      description: Production server