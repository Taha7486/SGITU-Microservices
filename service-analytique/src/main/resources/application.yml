server:
  port: 8088

spring:
  application:
    name: g8-analytics-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/g8_analytics}
      database: g8_analytics
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: g8-analytics-group
      auto-offset-reset: earliest
      enable-auto-commit: false

kafka:
  topics:
    ticketing: ${KAFKA_TOPIC_TICKETING:g2-ticketing-events}
    subscription: ${KAFKA_TOPIC_SUBSCRIPTION:g3-subscription-events}
    payment: ${KAFKA_TOPIC_PAYMENT:g4-payment-events}
    vehicle: ${KAFKA_TOPIC_VEHICLE:g6-vehicle-events}
    incident: ${KAFKA_TOPIC_INCIDENT:g7-incident-events}
    user: ${KAFKA_TOPIC_USER:g1-user-events}

logging:
  level:
    ma.sgitu.g8: DEBUG

g5:
  notification:
    url: ${G5_NOTIFICATION_URL:http://localhost:8085/api/notifications/send}

ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:5000}

resilience4j:
  circuitbreaker:
    instances:
      g5AlertCircuitBreaker:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true