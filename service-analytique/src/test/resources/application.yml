spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/g8_analytics_test
      database: g8_analytics_test
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: g8-analytics-group-test
      auto-offset-reset: earliest
      enable-auto-commit: false
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

kafka:
  topics:
    ticketing: g2-ticketing-events-test
    subscription: g3-subscription-events-test
    payment: g4-payment-events-test
    vehicle: g6-vehicle-events-test
    incident: g7-incident-events-test
    user: g1-user-events-test

g5:
  notification:
    url: http://localhost:9999/notifications-test

ml:
  service:
    url: http://localhost:5000

g8:
  scheduler:
    auto-run: false

resilience4j:
  circuitbreaker:
    instances:
      g5AlertCircuitBreaker:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 2

logging:
  level:
    ma.sgitu.g8: WARN
