services:

  mongodb:
    image: mongo:7.0
    container_name: g8-mongo
    ports:
      - "27017:27017"
    volumes:
      - g8-mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: g8_analytics
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  ml-service:
    build: ./ml-service
    container_name: g8-ml-service
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/docs')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  g8-analytics:
    build: .
    container_name: g8-analytics-service
    ports:
      - "8088:8088"
    environment:
      MONGO_URI: mongodb://mongodb:27017/g8_analytics
      ML_SERVICE_URL: http://ml-service:5000
    depends_on:
      mongodb:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    restart: on-failure

  mongo-express:
    image: mongo-express
    container_name: g8-mongo-express
    restart: always
    ports:
      - "9099:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongodb:
        condition: service_healthy


volumes:
  g8-mongo-data:
