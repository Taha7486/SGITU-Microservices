version: '3.8'

networks:
  sgitu-network:
    driver: bridge
    name: sgitu-network

volumes:
  g8-mongo-data:
  g7-postgres-data:
  g6-mysql-data:
  prometheus-data:
  grafana-data:

# ============================================================
#  INFRASTRUCTURE PARTAGÉE
# ============================================================
services:

  # ─── Zookeeper (requis par Kafka) ─────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sgitu-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - sgitu-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka ────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sgitu-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - sgitu-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: sgitu-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - sgitu-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # ─── Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: sgitu-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: sgitu2026
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - sgitu-network

# ============================================================
#  G8 — SERVICE ANALYTIQUE
# ============================================================
  g8-mongodb:
    image: mongo:7.0
    container_name: g8-mongo
    ports:
      - "27017:27017"
    volumes:
      - g8-mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: g8_analytics
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sgitu-network

  g8-analytics:
    build: ./service-analytique
    container_name: g8-analytics-service
    ports:
      - "8088:8088"
    environment:
      MONGO_URI: mongodb://g8-mongodb:27017/g8_analytics
      ML_SERVICE_URL: http://g8-ml-service:5000
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: sgitu_g8_secret_key_2025_very_long_secret_for_analytics
    depends_on:
      g8-mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - sgitu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  g8-ml-service:
    build: ./service-analytique/ml-service
    container_name: g8-ml-service
    ports:
      - "5000:5000"
    networks:
      - sgitu-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# ============================================================
#  G7 — SERVICE SUIVI VÉHICULE
# ============================================================
  g7-postgres:
    image: postgres:15-alpine
    container_name: g7-postgres
    environment:
      POSTGRES_DB: g7_vehicules
      POSTGRES_USER: g7user
      POSTGRES_PASSWORD: g7password
    ports:
      - "5432:5432"
    volumes:
      - g7-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U g7user -d g7_vehicules"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgitu-network

  g7-suivi-vehicule:
    build: ./service-suivi-vehicule
    container_name: g7-suivi-vehicule
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://g7-postgres:5432/g7_vehicules
      SPRING_DATASOURCE_USERNAME: g7user
      SPRING_DATASOURCE_PASSWORD: g7password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      g7-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - sgitu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ============================================================
#  G6 — SERVICE PAIEMENT
# ============================================================
  g6-mysql:
    image: mysql:8.0
    container_name: g6-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payment_db
    ports:
      - "3306:3306"
    volumes:
      - g6-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=root"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sgitu-network

  g6-paiement:
    build: ./service-paiement
    container_name: g6-paiement-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://g6-mysql:3306/payment_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      g6-mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - sgitu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
