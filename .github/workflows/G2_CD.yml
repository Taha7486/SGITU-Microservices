name: G2 CD - Service Abonnement

on:
  # Le CD ne se lance UNIQUEMENT que lorsqu'on push sur la branche "main"
  push:
    branches: [ "main" ]
    paths:
      - 'service-abonnement/**'

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construction et Push de l'image Docker (Service Abonnement)
        uses: docker/build-push-action@v5
        with:
          context: ./service-abonnement
          file: ./service-abonnement/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/service-abonnement:latest
