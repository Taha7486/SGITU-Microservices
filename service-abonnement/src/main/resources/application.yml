server:
  port: 8082

spring:
  application:
    name: service-abonnement
  
  datasource:
    url: jdbc:mysql://localhost:3306/abonnement_db?createDatabaseIfNotExist=true
    username: abonnement_user
    password: abonnement_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

application:
  config:
    utilisateur-service-url: http://localhost:8081
    paiement-service-url: http://localhost:8083
    notification-service-url: http://localhost:8084

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
